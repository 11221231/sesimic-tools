<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KDS 내진설계 통합 워크스페이스</title>
  <style>
    :root {
      --sidebar-width: 280px;
      --primary: #2563eb;
      --dark: #0f172a;
      --header-height: 60px;
    }
    
    body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #f8fafc; overflow: hidden; }

    /* 모바일용 상단 헤더 (기본적으로 숨김) */
    .mobile-header {
      display: none;
      height: var(--header-height);
      background: var(--dark);
      color: white;
      align-items: center;
      padding: 0 20px;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      justify-content: space-between;
    }

    .container { display: flex; height: 100vh; }

    /* 사이드바 */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--dark);
      color: white;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .brand { padding: 30px 25px; font-size: 1.2rem; font-weight: bold; color: #60a5fa; border-bottom: 1px solid #1e293b; }
    .nav-menu { flex: 1; overflow-y: auto; padding-top: 10px; }
    .nav-item {
      padding: 15px 25px;
      cursor: pointer;
      color: #94a3b8;
      border-left: 4px solid transparent;
    }
    .nav-item:hover { background: #1e293b; color: white; }
    .nav-item.active { background: #1e293b; color: white; border-left-color: var(--primary); }
    .nav-item small { display: block; font-size: 0.75rem; margin-top: 4px; opacity: 0.6; }

    /* 메인 화면 */
    .main-content { flex: 1; position: relative; }
    iframe { width: 100%; height: 100%; border: none; }

    /* 📱 모바일 미디어 쿼리 (화면 너비 768px 이하) */
    @media (max-width: 768px) {
      .mobile-header { display: flex; }
      
      .sidebar {
        position: fixed;
        left: 0; top: 0; bottom: 0;
        transform: translateX(-100%); /* 처음에 숨김 */
      }
      .sidebar.open { transform: translateX(0); }

      .main-content {
        padding-top: var(--header-height); /* 헤더 높이만큼 띄움 */
      }

      /* 사이드바 열렸을 때 배경 어둡게 */
      .overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5);
        z-index: 999;
      }
      .overlay.show { display: block; }
    }

    /* 햄버거 버튼 스타일 */
    .menu-toggle {
      background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;
    }
  </style>
</head>
<body>

<header class="mobile-header">
  <div style="font-weight: bold; color: #60a5fa;">🏗️ SEISMIC PORTAL</div>
  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="container">
  <nav class="sidebar" id="sidebar">
    <div class="brand">🏗️ SEISMIC PORTAL</div>
    <div class="nav-menu">
      <div class="nav-item active" onclick="changePage(this, 'seismic_design.html')">
        비구조내진 하중산정
        <small>지하주차장 벽체 검토</small>
      </div>
      <div class="nav-item" onclick="changePage(this, 'spectrum.html')">
        응답스펙트럼 분석
        <small>KDS 기준 차트 분석</small>
      </div>
      <div class="nav-item" onclick="changePage(this, 'building_period.html')">
        건축물 주기 가이드
        <small>구조 역학 시각화</small>
      </div>
      <div class="nav-item" onclick="changePage(this, 'visual_report.html')">
        비주얼 리포트
        <small>KDS 41 핵심 정리</small>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <iframe id="contentFrame" src="seismic_design.html"></iframe>
  </main>
</div>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }

  function changePage(el, url) {
    document.getElementById('contentFrame').src = url;
    
    // 메뉴 활성화 스타일
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');

    // 모바일인 경우 메뉴 클릭 시 사이드바 닫기
    if (window.innerWidth <= 768) {
      toggleSidebar();
    }
  }
</script>

</body>
</html>
