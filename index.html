<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>내진설계 통합 워크스페이스</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --sidebar: #1e293b;
      --sidebar-hover: #334155;
      --sidebar-active: #3b82f6;
      --text-light: #f8fafc;
      --text-muted: #94a3b8;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background-color: var(--bg);
    }
    /* 사이드바 스타일 */
    .sidebar {
      width: 280px;
      background-color: var(--sidebar);
      color: var(--text-light);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      box-shadow: 4px 0 15px rgba(0,0,0,0.1);
      z-index: 10;
    }
    .logo {
      padding: 24px;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .menu-list {
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 8px;
    }
    .menu-item {
      padding: 14px 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text-muted);
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }
    .menu-item:hover {
      background-color: var(--sidebar-hover);
      color: var(--text-light);
    }
    .menu-item.active {
      background-color: rgba(59, 130, 246, 0.15);
      color: var(--sidebar-active);
      border-color: rgba(59, 130, 246, 0.3);
    }
    .menu-item .sub-text {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      margin-top: 4px;
      opacity: 0.7;
    }
    
    /* 메인 콘텐츠(Iframe) 영역 */
    .content {
      flex: 1;
      height: 100vh;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #fff;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo">
      <span>🏢 내진설계 포털</span>
    </div>
    <div class="menu-list">
      <div class="menu-item active" onclick="loadPage(this, 'seismic_design.html')">
        하중산정 및 상세 검토
        <span class="sub-text">지하주차장 콘크리트 벽체 비구조내진설계</span>
      </div>
      
      <div class="menu-item" onclick="loadPage(this, 'spectrum.html')">
        응답스펙트럼 분석기 (Pro)
        <span class="sub-text">KDS 기준 스펙트럼 차트 및 계수 산출</span>
      </div>

      <div class="menu-item" onclick="loadPage(this, 'building_period.html')">
        내진설계 마스터 가이드
        <span class="sub-text">건축물 주기 역학적 이해 및 시각화</span>
      </div>

      <div class="menu-item" onclick="loadPage(this, 'visual_report.html')">
        비주얼 리포트
        <span class="sub-text">KDS 41 핵심 정리 및 작도 가이드</span>
      </div>
    </div>
  </div>

  <div class="content">
    <iframe id="mainFrame" src="seismic_design.html"></iframe>
  </div>

  <script>
    function loadPage(element, url) {
      // 1. Iframe 경로 변경
      document.getElementById('mainFrame').src = url;
      
      // 2. 메뉴 활성화(Active) 스타일 변경
      const items = document.querySelectorAll('.menu-item');
      items.forEach(item => item.classList.remove('active'));
      element.classList.add('active');
    }
  </script>

</body>
</html>
