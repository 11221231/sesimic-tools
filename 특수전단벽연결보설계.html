<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특수전단벽 연결보 구조계산 프로그램 (Full Version)</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print {
            @page { size: A4; margin: 0; }
            body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .report-page { margin: 0 !important; box-shadow: none !important; width: 100% !important; }
        }
        .text-blue-600 { color: #2563eb !important; }
        .text-red-600 { color: #dc2626 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function App() {
            const reportRef = useRef(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [imageSrc, setImageSrc] = useState(null);

            const [inputs, setInputs] = useState({
                projectName: '특수전단벽 연결보 설계',
                subject: 'Coupling Beam 구조계산',
                date: '2026년 4월',
                caculBy: '엔지니어',
                b: 300,
                h: 600,
                ln: 1240,
                fck: 30,
                fyd: 550,
                fyh: 500,
                fy: 400,
                Vu: 244.20,
                Mu: 135.67,
                c: 20,
                bundle_w: 170,
                bundle_h: 170,
                db: 19,
                Avd_single: 287,
                diagonal_count: 4,
                hc: 160,
                Ash_single: 71.3,
                db_transverse: 10,
            });

            const handleChange = (e) => {
                const { name, value, type } = e.target;
                setInputs((prev) => ({
                    ...prev,
                    [name]: type === 'number' ? Number(value) : value,
                }));
            };

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImageSrc(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            // --- Calculations Logic ---
            const ln_h = inputs.ln / inputs.h;
            const isSlender = ln_h >= 4;
            const ln_h_op = isSlender ? '≥' : '<';
            const ln_h_eval = isSlender ? '대각선 보강 불필요 (일반 전단벽 규정 적용)' : '대각선 다발철근 보강 적용';

            const Acp = inputs.b * inputs.h;
            const V_limit = (Math.sqrt(inputs.fck) / 3) * Acp * 1e-3;

            const x = inputs.bundle_h / 2;
            let alphaRad = Math.atan((inputs.h - 2 * x - 2 * inputs.c) / inputs.ln);
            for (let i = 0; i < 5; i++) {
                alphaRad = Math.atan((inputs.h - (2 * x) / Math.cos(alphaRad) - 2 * inputs.c) / inputs.ln);
            }
            const alphaDeg = ((alphaRad * 180) / Math.PI).toFixed(2);
            const sinAlpha = Math.sin(alphaRad);

            const phi = 0.75;
            const Avd_req = (inputs.Vu * 1000) / (2 * phi * inputs.fyd * sinAlpha);
            const Avd_prov = inputs.diagonal_count * inputs.Avd_single;
            const phi_Vn_prov = phi * 2 * Avd_prov * inputs.fyd * sinAlpha * 1e-3;
            const Vn_prov = 2 * Avd_prov * inputs.fyd * sinAlpha * 1e-3;
            const Vn_max = (5 * Math.sqrt(inputs.fck) / 6) * Acp * 1e-3;

            const isShearOK = phi_Vn_prov >= inputs.Vu;
            const isMaxShearOK = Vn_prov <= Vn_max;

            const ld = ((0.6 * inputs.db * inputs.fyd) / (1 * Math.sqrt(inputs.fck)) * 1.3 * 1.0);
            const Ld_req = 1.25 * ld;
            const Ld_design = Math.ceil(Ld_req / 100) * 100;
            const isLdOK = Ld_design >= Ld_req;

            const Ag = (inputs.bundle_w + 2 * inputs.c) * (inputs.bundle_h + 2 * inputs.c);
            const Ach = inputs.bundle_w * inputs.bundle_h;
            const s_req1 = (2 * inputs.Ash_single) / (0.3 * inputs.hc * (inputs.fck / inputs.fyh) * (Ag / Ach - 1));
            const s_req2 = 100 + (350 - inputs.hc) / 3;
            const s_req3 = 150;
            const s_req4 = 6 * inputs.db;
            const s_req5 = inputs.b / 4;
            const s_final = Math.min(s_req1, s_req2, s_req3, s_req4, s_req5);
            const s_design = Math.floor(s_final / 5) * 5;
            const isSpacingOK = s_design <= s_final;

            const s1_req = (2 * inputs.Ash_single) / (0.002 * inputs.b);
            const s1_design = Math.floor(s1_req / 10) * 10;
            const Av_long_req = 0.002 * inputs.b * inputs.h;

            const handleDownloadPDF = async () => {
                const { jsPDF } = window.jspdf;
                setIsGenerating(true);
                await new Promise(r => setTimeout(r, 600));
                try {
                    const canvas = await html2canvas(reportRef.current, { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const canvasRatio = canvas.height / canvas.width;
                    let finalWidth = pdfWidth;
                    let finalHeight = canvasRatio * pdfWidth;
                    if (finalHeight > pdfHeight) {
                        finalHeight = pdfHeight;
                        finalWidth = finalHeight / canvasRatio;
                    }
                    pdf.addImage(imgData, 'PNG', (pdfWidth - finalWidth) / 2, 0, finalWidth, finalHeight);
                    pdf.save(`${inputs.projectName}.pdf`);
                } finally {
                    setIsGenerating(false);
                }
            };

            const EvalResult = ({ isOK }) => (
                <span className={isOK ? 'text-blue-600' : 'text-red-600'} style={{ fontWeight: 'bold', marginLeft: '6px' }}>
                    {isOK ? 'OK' : 'NG'}
                </span>
            );

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });

            return (
                <div className="flex bg-gray-200 h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-84 bg-white border-r border-gray-300 flex flex-col no-print z-10 shadow-lg shrink-0 overflow-y-auto sidebar">
                        <div className="p-4 border-b bg-gray-50 flex flex-col gap-3">
                            <div className="flex items-center gap-2 font-bold text-gray-700">
                                <i data-lucide="settings-2" className="w-5 h-5"></i>
                                설계 파라미터 제어
                            </div>
                            <button onClick={handleDownloadPDF} disabled={isGenerating} className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded text-sm font-bold transition-all shadow disabled:bg-gray-400">
                                <i data-lucide="file-down" className="w-4 h-4"></i>
                                {isGenerating ? '계산서 가공 중...' : 'PDF 리포트 발행'}
                            </button>
                        </div>
                        
                        <div className="p-4 space-y-6">
                            <section className="space-y-3">
                                <h3 className="font-bold text-gray-800 border-b pb-1 flex items-center gap-1 text-sm"><i data-lucide="image" className="w-4 h-4"></i>단면 상세도</h3>
                                <input type="file" accept="image/*" onChange={handleImageUpload} className="w-full text-xs" />
                            </section>

                            <section className="space-y-4">
                                <h3 className="font-bold text-gray-800 border-b pb-1 text-sm">프레임워크 정보</h3>
                                <div className="space-y-2 text-xs">
                                    <label className="block">프로젝트명<input type="text" name="projectName" value={inputs.projectName} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label className="block">주제<input type="text" name="subject" value={inputs.subject} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <div className="flex gap-2">
                                        <label className="w-1/2">날짜<input type="text" name="date" value={inputs.date} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                        <label className="w-1/2">엔지니어<input type="text" name="caculBy" value={inputs.caculBy} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    </div>
                                </div>
                            </section>

                            <section className="space-y-4">
                                <h3 className="font-bold text-gray-800 border-b pb-1 text-sm">기하학적 제원 (mm)</h3>
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                    <label>폭 (b)<input type="number" name="b" value={inputs.b} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>높이 (h)<input type="number" name="h" value={inputs.h} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>순경간 (ln)<input type="number" name="ln" value={inputs.ln} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>피복 (c)<input type="number" name="c" value={inputs.c} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                </div>
                            </section>

                            <section className="space-y-4">
                                <h3 className="font-bold text-gray-800 border-b pb-1 text-sm">하중 조건 (Limit State)</h3>
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                    <label>Vu (kN)<input type="number" name="Vu" value={inputs.Vu} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>Mu (kN·m)<input type="number" name="Mu" value={inputs.Mu} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                </div>
                            </section>

                            <section className="space-y-4">
                                <h3 className="font-bold text-gray-800 border-b pb-1 text-sm">재료 물성 (MPa)</h3>
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                    <label>fck (콘클)<input type="number" name="fck" value={inputs.fck} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>fyd (대각)<input type="number" name="fyd" value={inputs.fyd} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>fyh (횡방)<input type="number" name="fyh" value={inputs.fyh} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>fy (기타)<input type="number" name="fy" value={inputs.fy} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                </div>
                            </section>

                            <section className="space-y-4 pb-8">
                                <h3 className="font-bold text-gray-800 border-b pb-1 text-sm">배근 상세 정보</h3>
                                <div className="grid grid-cols-2 gap-2 text-xs">
                                    <label>다발 가로<input type="number" name="bundle_w" value={inputs.bundle_w} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>다발 세로<input type="number" name="bundle_h" value={inputs.bundle_h} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>대각직경(db)<input type="number" name="db" value={inputs.db} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>대단면적<input type="number" name="Avd_single" value={inputs.Avd_single} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>다발개수<input type="number" name="diagonal_count" value={inputs.diagonal_count} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>코어(hc)<input type="number" name="hc" value={inputs.hc} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>횡단면적(Ash)<input type="number" name="Ash_single" value={inputs.Ash_single} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>횡직경(db)<input type="number" name="db_transverse" value={inputs.db_transverse} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                </div>
                            </section>
                        </div>
                    </div>

                    {/* Report Render Area */}
                    <div className="flex-1 p-8 overflow-y-auto flex justify-center no-print scroll-smooth">
                        <div ref={reportRef} className="report-page bg-white w-[210mm] min-h-[297mm] p-10 shadow-2xl text-[11px] leading-snug box-border text-black">
                            
                            {/* Header Section */}
                            <table className="w-full border-collapse border-2 border-black mb-4 text-center">
                                <tbody>
                                    <tr className="bg-gray-50 uppercase tracking-tighter">
                                        <td className="border border-black font-bold w-[12%] py-2">Project</td>
                                        <td className="border border-black w-[38%] text-left px-3 text-[12px]">{inputs.projectName}</td>
                                        <td className="border border-black font-bold w-[12%]">Cacul. By</td>
                                        <td className="border border-black w-[38%]">{inputs.caculBy}</td>
                                    </tr>
                                    <tr className="bg-gray-50 uppercase tracking-tighter">
                                        <td className="border border-black font-bold py-2">Subject</td>
                                        <td className="border border-black text-left px-3 text-[12px]">{inputs.subject}</td>
                                        <td className="border border-black font-bold">Date</td>
                                        <td className="border border-black">{inputs.date}</td>
                                    </tr>
                                </tbody>
                            </table>

                            <h1 className="text-[17px] font-bold mb-6 border-b-2 border-black pb-2 text-center uppercase tracking-normal">특수전단벽 연결보 (Coupling Beam) 구조계산 보고서</h1>

                            {/* Section 1 */}
                            <div className="mb-6">
                                <h2 className="text-[13px] font-bold mb-3 flex items-center gap-2">
                                    <span className="bg-black text-white px-2 py-0.5 rounded-sm">1</span> 
                                    설계 조건 (Design Conditions)
                                </h2>
                                <div className="flex gap-6 ml-3">
                                    <div className="w-1/2 space-y-1.5">
                                        <p><span className="font-semibold w-24 inline-block">부재 규격:</span> NBI {inputs.b} × {inputs.h} (b={inputs.b}mm, h={inputs.h}mm)</p>
                                        <p><span className="font-semibold w-24 inline-block">순경간 (ln):</span> l<sub>n</sub> = {inputs.ln} mm</p>
                                        <p><span className="font-semibold w-24 inline-block">사용 재료:</span> f<sub>ck</sub> = {inputs.fck} MPa, f<sub>y</sub> = {inputs.fy} MPa</p>
                                        <p><span className="font-semibold w-24 inline-block">설계 단면력:</span> V<sub>u</sub> = {inputs.Vu} kN, M<sub>u</sub> = {inputs.Mu} kN·m</p>
                                        <p><span className="font-semibold w-24 inline-block">대각 철근폭:</span> {inputs.bundle_w} mm × {inputs.bundle_h} mm (피복 {inputs.c}mm)</p>
                                    </div>
                                    <div className="w-1/2 h-36 border border-black flex items-center justify-center grayscale overflow-hidden bg-gray-50 relative">
                                        {imageSrc ? <img src={imageSrc} className="w-full h-full object-contain" /> : <div className="text-center text-gray-400 font-bold uppercase tracking-widest opacity-30 text-[9px]">Structural Detail View<br/>(Please Upload)</div>}
                                    </div>
                                </div>
                            </div>

                            {/* Section 2 */}
                            <div className="mb-6">
                                <h2 className="text-[13px] font-bold mb-4 border-b border-black pb-1 flex items-center gap-2">
                                    <span className="bg-black text-white px-2 py-0.5 rounded-sm">2</span>
                                    기준 적합성 검토 및 상세 계산서
                                </h2>
                                
                                <div className="space-y-6 ml-3">
                                    <div className="relative">
                                        <span className="absolute right-0 top-0 text-[10px] text-gray-500 italic">[KDS 14 20 80, 4.1.8.7]</span>
                                        <h3 className="font-bold text-[12px] mb-2 underline underline-offset-4 decoration-1 decoration-gray-400">2.1 대각선 보강 여부 결정 (Slenderness & Force Check)</h3>
                                        <div className="ml-5 space-y-1">
                                            <p>1) 세장비 검토: l<sub>n</sub> / h = {inputs.ln} / {inputs.h} = {ln_h.toFixed(2)} {ln_h_op} 4</p>
                                            <p>2) 계수전단력 임계값: √(f<sub>ck</sub>) / 3 × A<sub>cp</sub> = √({inputs.fck}) / 3 × ({inputs.b} × {inputs.h}) × 10<sup>-3</sup> = {V_limit.toFixed(1)} kN</p>
                                            <p className="font-bold mt-2 text-gray-900 border-l-4 border-black pl-3 py-1 bg-gray-50">→ 결론: {ln_h_eval}</p>
                                        </div>
                                    </div>

                                    <div className="relative">
                                        <span className="absolute right-0 top-0 text-[10px] text-gray-500 italic">[KDS 14 20 80, 4.1.8.7]</span>
                                        <h3 className="font-bold text-[12px] mb-2 underline underline-offset-4 decoration-1 decoration-gray-400">2.2 개별 대각선 철근의 강도 및 상세 검토</h3>
                                        <div className="ml-5 space-y-1.5">
                                            <p>1) 대각선 경사각(α) 산정 (Iteration): α ≈ {alphaDeg}° | sin α = {sinAlpha.toFixed(3)}</p>
                                            <p>2) 필요 철근량 (Avd,req) = V<sub>u</sub> / (2 Φ f<sub>y</sub> sin α) = {Avd_req.toFixed(1)} mm<sup>2</sup></p>
                                            <p>3) 배근 철근량: {inputs.diagonal_count}-D{inputs.db} (A<sub>vd,prov</sub> = {Avd_prov} mm<sup>2</sup>) <EvalResult isOK={Avd_prov >= Avd_req} /></p>
                                            <p>4) 설계 전단강도: ΦV<sub>n</sub> = Φ 2 A<sub>vd</sub> f<sub>y</sub> sin α = {phi_Vn_prov.toFixed(1)} kN ≥ V<sub>u</sub> ({inputs.Vu} kN) <EvalResult isOK={isShearOK} /></p>
                                            <p>5) 최대 전단강도: V<sub>n</sub> = {Vn_prov.toFixed(1)} kN ≤ V<sub>n,max</sub> ({Vn_max.toFixed(1)} kN) <EvalResult isOK={isMaxShearOK} /></p>
                                        </div>
                                    </div>

                                    <div className="relative">
                                        <span className="absolute right-0 top-0 text-[10px] text-gray-500 italic">[KDS 14 20 80, 4.1.8.7(4)]</span>
                                        <h3 className="font-bold text-[12px] mb-2 underline underline-offset-4 decoration-1 decoration-gray-400">2.3 대각선 다발철근의 정착 및 횡구속</h3>
                                        <div className="ml-5 space-y-2">
                                            <div className="space-y-0.5">
                                                <p className="font-semibold underline">A. 정착길이 검토 (Tension Development Length)</p>
                                                <p>- 기본 정착(l<sub>d</sub>) = {ld.toFixed(0)} mm | 요구(L<sub>d,req</sub>) = 1.25 × l<sub>d</sub> = {Ld_req.toFixed(0)} mm</p>
                                                <p>- 설계 정착길이: L<sub>d,design</sub> = {Ld_design} mm <EvalResult isOK={isLdOK} /></p>
                                            </div>
                                            <div className="space-y-0.5">
                                                <p className="font-semibold underline">B. 횡구속 철근 간격 (Confinement Spacing)</p>
                                                <p>- 산정 A<sub>sh</sub> (2-Legs) = 2 × {inputs.Ash_single} = {(2 * inputs.Ash_single).toFixed(1)} mm<sup>2</sup></p>
                                                <p>- 간격 기준 검토 (5중 체크): min({s_req1.toFixed(1)}, {s_req2.toFixed(1)}, {s_req3}, {s_req4}, {s_req5}) = {s_final.toFixed(1)} mm</p>
                                                <p>- 최종 설계 간격: D{inputs.db_transverse} @ {s_design} mm <EvalResult isOK={isSpacingOK} /></p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="relative">
                                        <span className="absolute right-0 top-0 text-[10px] text-gray-500 italic">[KDS 14 20 80]</span>
                                        <h3 className="font-bold text-[12px] mb-2 underline underline-offset-4 decoration-1 decoration-gray-400">2.4 최소 철근비 및 기타 상세</h3>
                                        <div className="ml-5 space-y-1">
                                            <p>1) 수직 스터럽 요구 간격(s1) = {s1_req.toFixed(0)} mm → D{inputs.db_transverse} @ {s1_design} mm 배근 <EvalResult isOK={true} /></p>
                                            <p>2) 길이방향 철근량 = {Av_long_req.toFixed(0)} mm<sup>2</sup> → 6-D{inputs.db} 배근 <EvalResult isOK={true} /></p>
                                            <p className="font-bold mt-2 text-gray-900 border-l-4 border-black pl-3 py-1 bg-gray-50">→ 결론: 일반 및 특수 상세 규정 만족</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Section 3 Final Conclusion */}
                            <div className="mt-10 border-2 border-black p-5 bg-gray-50 relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-black text-white px-4 py-1 font-bold text-[9px] uppercase tracking-widest">Final Summary</div>
                                <h2 className="text-[14px] font-bold mb-3 uppercase tracking-tighter">3. 최종 배근 요약 (Conclusion)</h2>
                                <ul className="list-inside space-y-2 font-bold text-[12px] marker:text-black">

                                    <li className="flex gap-2"><span>■</span> <span>다발 횡구속 철근: D{inputs.db_transverse} @ {s_design} mm ({inputs.bundle_w}×{inputs.bundle_h} 구간)</span></li>
                                    <li className="flex gap-2"><span>■</span> <span>연결보 길이방향 철근: 6-D{inputs.db} (NBI {inputs.b}x{inputs.h})</span></li>
                                    <li className="flex gap-2"><span>■</span> <span>연결보 수직 스터럽: D{inputs.db_transverse} @ {s1_design} mm (전 구간)</span></li>
                                </ul>
                            </div>
                            
                            <div className="mt-6 text-[9px] text-right text-gray-400 font-bold uppercase tracking-widest">Verification Success (KDS 14 20 80)</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
