<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특수전단벽 연결보 구조계산 프로그램</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #e5e7eb; overflow: hidden; }
        @media print {
            @page { size: A4; margin: 0; }
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function App() {
            const reportRef = useRef(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [imageSrc, setImageSrc] = useState(null);

            const [inputs, setInputs] = useState({
                projectName: '특수전단벽 연결보 설계',
                subject: 'Coupling Beam 구조계산',
                date: '2026년 4월',
                caculBy: '엔지니어',
                b: 300,
                h: 600,
                ln: 1240,
                fck: 30,
                fyd: 550, // 대각선 철근 항복강도
                fyh: 500, // 횡철근 항복강도
                fy: 400,  // 기타 철근 항복강도
                Vu: 244.20,
                Mu: 135.67,
                c: 20,
                bundle_w: 170, // 다발 가로
                bundle_h: 170, // 다발 세로
                db: 19,
                Avd_single: 287,
                diagonal_count: 4,
                hc: 160,
                Ash_single: 71.3,
                db_transverse: 10,
            });

            const handleChange = (e) => {
                const { name, value, type } = e.target;
                setInputs((prev) => ({
                    ...prev,
                    [name]: type === 'number' ? Number(value) : value,
                }));
            };

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImageSrc(reader.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            // --- Calculations & Validations ---
            const ln_h = inputs.ln / inputs.h;
            const isSlender = ln_h >= 4;
            const ln_h_op = isSlender ? '≥' : '<';
            const ln_h_eval = isSlender ? '대각선 보강 불필요 (일반 전단벽 규정 적용)' : '대각선 다발철근 보강 적용';

            const Acp = inputs.b * inputs.h;
            const V_limit = (Math.sqrt(inputs.fck) / 3) * Acp * 1e-3;

            const x = inputs.bundle_h / 2;
            let alphaRad = Math.atan((inputs.h - 2 * x - 2 * inputs.c) / inputs.ln);
            for (let i = 0; i < 5; i++) {
                alphaRad = Math.atan((inputs.h - (2 * x) / Math.cos(alphaRad) - 2 * inputs.c) / inputs.ln);
            }
            const alphaDeg = ((alphaRad * 180) / Math.PI).toFixed(2);
            const sinAlpha = Math.sin(alphaRad);

            const phi = 0.75;
            const Avd_req = (inputs.Vu * 1000) / (2 * phi * inputs.fyd * sinAlpha);
            const Avd_prov = inputs.diagonal_count * inputs.Avd_single;
            const phi_Vn_prov = phi * 2 * Avd_prov * inputs.fyd * sinAlpha * 1e-3;
            const Vn_prov = 2 * Avd_prov * inputs.fyd * sinAlpha * 1e-3;
            const Vn_max = (5 * Math.sqrt(inputs.fck) / 6) * Acp * 1e-3;

            const isShearOK = phi_Vn_prov >= inputs.Vu;
            const isMaxShearOK = Vn_prov <= Vn_max;

            const ld = ((0.6 * inputs.db * inputs.fyd) / (1 * Math.sqrt(inputs.fck)) * 1.3 * 1.0);
            const Ld_req = 1.25 * ld;
            const Ld_design = Math.ceil(Ld_req / 100) * 100;
            const isLdOK = Ld_design >= Ld_req;

            const Ag = (inputs.bundle_w + 2 * inputs.c) * (inputs.bundle_h + 2 * inputs.c);
            const Ach = inputs.bundle_w * inputs.bundle_h;
            const s_req1 = (2 * inputs.Ash_single) / (0.3 * inputs.hc * (inputs.fck / inputs.fyh) * (Ag / Ach - 1));
            const hx = inputs.hc;
            const s_req2 = 100 + (350 - hx) / 3;
            const s_req3 = 150;
            const s_req4 = 6 * inputs.db;
            const s_req5 = inputs.b / 4;
            const s_final = Math.min(s_req1, s_req2, s_req3, s_req4, s_req5);
            const s_design = Math.floor(s_final / 5) * 5;
            const isSpacingOK = s_design <= s_final;

            const s1_req = (2 * inputs.Ash_single) / (0.002 * inputs.b);
            const s1_design = Math.floor(s1_req / 10) * 10;
            const Av_long_req = 0.002 * inputs.b * inputs.h;

            const handleDownloadPDF = async () => {
                const { jsPDF } = window.jspdf;
                setIsGenerating(true);
                await new Promise(resolve => setTimeout(resolve, 500));
                
                try {
                    const canvas = await html2canvas(reportRef.current, { scale: 2, useCORS: true });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    
                    const canvasRatio = canvas.height / canvas.width;
                    let finalWidth = pdfWidth;
                    let finalHeight = canvasRatio * pdfWidth;
                    
                    if (finalHeight > pdfHeight) {
                        finalHeight = pdfHeight;
                        finalWidth = finalHeight / canvasRatio;
                    }
                    
                    pdf.addImage(imgData, 'PNG', (pdfWidth - finalWidth) / 2, 0, finalWidth, finalHeight);
                    pdf.save(`${inputs.projectName}_구조계산서.pdf`);
                } finally {
                    setIsGenerating(false);
                }
            };

            const EvalResult = ({ isOK }) => (
                <span className={isOK ? 'text-blue-600' : 'text-red-600'} style={{ fontWeight: 'bold', marginLeft: '6px' }}>
                    {isOK ? 'OK' : 'NG'}
                </span>
            );

            // Initialize Lucide icons on render
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar (Full Inputs) */}
                    <div className="w-80 bg-white border-r border-gray-300 flex flex-col no-print z-10 shadow-lg shrink-0 overflow-y-auto">
                        <div className="p-4 border-b border-gray-200 bg-gray-50 flex flex-col gap-3">
                            <div className="flex items-center gap-2 font-bold text-gray-700">
                                <i data-lucide="settings-2" className="w-5 h-5"></i>
                                설계 변수 입력
                            </div>
                            <button
                                onClick={handleDownloadPDF}
                                disabled={isGenerating}
                                className="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white px-4 py-2 rounded text-sm font-bold transition-all"
                            >
                                <i data-lucide="download" className="w-4 h-4"></i>
                                {isGenerating ? '생성 중...' : 'PDF 다운로드'}
                            </button>
                        </div>
                        
                        <div className="p-4 space-y-6 text-sm">
                            {/* Image Upload */}
                            <div className="space-y-3">
                                <h3 className="font-bold text-gray-800 border-b pb-1 flex items-center gap-1">
                                    <i data-lucide="image-plus" className="w-4 h-4"></i>
                                    단면도 이미지 업로드
                                </h3>
                                <input type="file" accept="image/*" onChange={handleImageUpload} className="w-full text-xs" />
                            </div>

                            {/* Project Info */}
                            <div className="space-y-3">
                                <h3 className="font-bold text-gray-800 border-b pb-1">프로젝트 정보</h3>
                                <div className="space-y-2">
                                    <label className="block">프로젝트명<input type="text" name="projectName" value={inputs.projectName} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label className="block">주제<input type="text" name="subject" value={inputs.subject} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label className="block text-xs">작성일/작성자
                                        <div className="flex gap-1 mt-1">
                                            <input type="text" name="date" value={inputs.date} onChange={handleChange} className="w-1/2 border rounded p-1.5" />
                                            <input type="text" name="caculBy" value={inputs.caculBy} onChange={handleChange} className="w-1/2 border rounded p-1.5" />
                                        </div>
                                    </label>
                                </div>
                            </div>

                            {/* Dimensions */}
                            <div className="space-y-3">
                                <h3 className="font-bold text-gray-800 border-b pb-1">부재 치수 (mm)</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    <label>폭 (b)<input type="number" name="b" value={inputs.b} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>높이 (h)<input type="number" name="h" value={inputs.h} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>순경간 (ln)<input type="number" name="ln" value={inputs.ln} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>피복 (c)<input type="number" name="c" value={inputs.c} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                </div>
                            </div>

                            {/* Forces */}
                            <div className="space-y-3">
                                <h3 className="font-bold text-gray-800 border-b pb-1">하중 (kN, kN·m)</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    <label>Vu<input type="number" name="Vu" value={inputs.Vu} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>Mu<input type="number" name="Mu" value={inputs.Mu} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                </div>
                            </div>

                            {/* Materials */}
                            <div className="space-y-3">
                                <h3 className="font-bold text-gray-800 border-b pb-1">재료 강도 (MPa)</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    <label>fck<input type="number" name="fck" value={inputs.fck} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>fyd (주)<input type="number" name="fyd" value={inputs.fyd} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>fyh (횡)<input type="number" name="fyh" value={inputs.fyh} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>fy<input type="number" name="fy" value={inputs.fy} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                </div>
                            </div>

                            {/* Rebar Details */}
                            <div className="space-y-3">
                                <h3 className="font-bold text-gray-800 border-b pb-1">철근 상세</h3>
                                <div className="grid grid-cols-2 gap-2">
                                    <label>다발 가로(w)<input type="number" name="bundle_w" value={inputs.bundle_w} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>다발 세로(h)<input type="number" name="bundle_h" value={inputs.bundle_h} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>대각 직경(db)<input type="number" name="db" value={inputs.db} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>개수<input type="number" name="diagonal_count" value={inputs.diagonal_count} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>직경(횡)<input type="number" name="db_transverse" value={inputs.db_transverse} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                    <label>간격(s)<input type="number" name="Ash_single" value={inputs.Ash_single} onChange={handleChange} className="w-full border rounded p-1.5 mt-1"/></label>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Report Area */}
                    <div className="flex-1 p-8 overflow-y-auto flex justify-center bg-gray-200">
                        <div ref={reportRef} className="print-area w-[210mm] min-h-[297mm] bg-white p-10 shadow-2xl text-[11px] leading-snug box-border" style={{ color: '#000000' }}>
                            {/* Header Table */}
                            <table className="w-full border-collapse border-2 mb-4 text-center border-black">
                                <tbody>
                                    <tr>
                                        <td className="border border-black w-[15%] font-bold py-1.5 bg-gray-50 uppercase">Project</td>
                                        <td className="border border-black w-[35%] text-left px-3">{inputs.projectName}</td>
                                        <td className="border border-black w-[15%] font-bold bg-gray-50 uppercase">By</td>
                                        <td className="border border-black w-[35%]">{inputs.caculBy}</td>
                                    </tr>
                                    <tr>
                                        <td className="border border-black font-bold py-1.5 bg-gray-50 uppercase">Subject</td>
                                        <td className="border border-black text-left px-3">{inputs.subject}</td>
                                        <td className="border border-black font-bold bg-gray-50 uppercase">Date</td>
                                        <td className="border border-black">{inputs.date}</td>
                                    </tr>
                                </tbody>
                            </table>

                            <h1 className="text-lg font-bold mb-4 border-b-2 border-black pb-1 text-center uppercase tracking-wider">특수전단벽 연결보 (Coupling Beam) 구조계산 보고서</h1>

                            {/* Section 1 */}
                            <div className="mb-5">
                                <h2 className="text-sm font-bold mb-2">1. 설계 조건 (Design Conditions)</h2>
                                <div className="flex gap-4 ml-2">
                                    <div className="w-1/2">
                                        <table className="w-full text-left border-none">
                                            <tbody className="space-y-1">
                                                <tr><td className="w-20 font-semibold">부재 규격</td><td>: NBI {inputs.b} × {inputs.h} mm</td></tr>
                                                <tr><td className="font-semibold">순경간 (ln)</td><td>: {inputs.ln} mm</td></tr>
                                                <tr><td className="font-semibold">사용 재료</td><td>: fck = {inputs.fck} MPa, fy = {inputs.fy} MPa</td></tr>
                                                <tr><td className="font-semibold">설계 하중</td><td>: Vu = {inputs.Vu} kN, Mu = {inputs.Mu} kN·m</td></tr>
                                                <tr><td className="font-semibold whitespace-nowrap">다발 크기</td><td>: {inputs.bundle_w} × {inputs.bundle_h} mm (피복 {inputs.c}mm)</td></tr>
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="w-1/2 h-32 border border-black flex items-center justify-center grayscale overflow-hidden bg-gray-50">
                                        {imageSrc ? <img src={imageSrc} className="w-full h-full object-contain" /> : <p className="text-gray-400 text-[10px]">단면 상세도 미업로드</p>}
                                    </div>
                                </div>
                            </div>

                            {/* Section 2 */}
                            <div className="mb-5">
                                <h2 className="text-sm font-bold mb-3 border-b border-black pb-1">2. 기준 적합성 검토 및 계산서</h2>
                                
                                <div className="space-y-4 ml-2">
                                    <div className="relative">
                                        <span className="absolute right-0 top-0 text-[9px] text-gray-500">[KDS 14 20 80, 4.1.8.7]</span>
                                        <h3 className="font-bold">2.1 대각선 보강 여부 결정</h3>
                                        <div className="ml-4 mt-1">
                                            <p>1) 세장비 검토: ln / h = {inputs.ln} / {inputs.h} = {ln_h.toFixed(2)} {ln_h_op} 4</p>
                                            <p>2) 임계 전단력: √(fck)/3 × Acp = √({inputs.fck})/3 × ({inputs.b}×{inputs.h}) × 10⁻³ = {V_limit.toFixed(1)} kN</p>
                                            <p className="font-bold mt-1 text-gray-800">→ {ln_h_eval}</p>
                                        </div>
                                    </div>

                                    <div className="relative">
                                        <span className="absolute right-0 top-0 text-[9px] text-gray-500">[KDS 14 20 80, 4.1.8.7]</span>
                                        <h3 className="font-bold">2.2 개별 대각선 철근의 강도 검토</h3>
                                        <div className="ml-4 mt-1 space-y-1">
                                            <p>1) 경사각(α) ≈ {alphaDeg}° | 필요량 (Avd,req) = {Avd_req.toFixed(1)} mm²</p>
                                            <p>2) 배근량: {inputs.diagonal_count}-D{inputs.db} (Avd,prov = {Avd_prov} mm²) <EvalResult isOK={Avd_prov >= Avd_req} /></p>
                                            <p>3) 설계 전단강도: ΦVn = {phi_Vn_prov.toFixed(1)} kN ≥ Vu ({inputs.Vu} kN) <EvalResult isOK={isShearOK} /></p>
                                            <p>4) 최대 전단강도: Vn = {Vn_prov.toFixed(1)} kN ≤ Vn,max = {Vn_max.toFixed(1)} kN <EvalResult isOK={isMaxShearOK} /></p>
                                        </div>
                                    </div>

                                    <div className="relative">
                                        <span className="absolute right-0 top-0 text-[9px] text-gray-500">[KDS 14 20 80]</span>
                                        <h3 className="font-bold">2.3 횡구속 철근 및 간격 규정</h3>
                                        <div className="ml-4 mt-1 space-y-1">
                                            <p>1) Ash (2-Legs) = 2 × {inputs.Ash_single} = {(2 * inputs.Ash_single).toFixed(1)} mm²</p>
                                            <p>2) 요구/최대 간격 규정 준수 검토: s_req = {s_final.toFixed(1)} mm</p>
                                            <p>3) 설계 배근 간격: D{inputs.db_transverse} @ {s_design} mm <EvalResult isOK={isSpacingOK} /></p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Section 3 */}
                            <div className="mt-8 border-2 border-black p-4 bg-gray-50">
                                <h2 className="text-base font-bold mb-2 border-b border-black pb-1 uppercase">3. 최종 배근 요약 (Conclusion)</h2>
                                <ul className="list-disc list-inside space-y-1 font-bold">
                                    <li>대각선 주철근: {inputs.diagonal_count}-D{inputs.db} (정착 l_d = {Ld_design} mm)</li>
                                    <li>다발부 횡구속 철근: D{inputs.db_transverse} @ {s_design} mm</li>
                                    <li>연결보 수직 스터럽: D{inputs.db_transverse} @ {s1_design} mm</li>
                                    <li>연결보 길이방향 철근: 최소 철근비 준수 배근</li>
                                </ul>
                            </div>
                            
                            <div className="mt-4 text-[10px] text-right text-gray-500 italic">본 보고서는 KDS 14 20 80 설계 기준을 바탕으로 자동 산출되었습니다.</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
