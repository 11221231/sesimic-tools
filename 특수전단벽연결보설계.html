<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연결보 구조계산 - 모바일 최적화 에디션</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; }
        
        /* Mobile-first layout adjustments */
        .report-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        
        @media (max-width: 768px) {
            .report-container { width: 100% !important; min-height: auto !important; padding: 20px !important; margin: 0 !important; }
            .sidebar { width: 100% !important; position: relative !important; height: auto !important; }
            .content-area { padding: 10px !important; }
            .report-title { font-size: 14px !important; }
            .section-title { font-size: 12px !important; }
            .main-flex { flex-direction: column !important; }
        }

        @media print {
            @page { size: A4; margin: 0; }
            .no-print { display: none !important; }
            .print-area { width: 210mm !important; margin: 0 !important; box-shadow: none !important; }
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo } = React;

        function App() {
            const reportRef = useRef(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [imageSrc, setImageSrc] = useState(null);
            const [activeTab, setActiveTab] = useState('input'); // 'input' or 'report' for mobile

            const [inputs, setInputs] = useState({
                projectName: '특수전단벽 연결보 설계',
                subject: 'Coupling Beam 구조계산',
                date: '2026. 04. 18',
                caculBy: '엔지니어',
                b: 300,
                h: 600,
                ln: 1240,
                fck: 30,
                fyd: 550, 
                fyh: 500, 
                fy: 400,  
                Vu: 244.20,
                Mu: 135.67,
                c: 20,
                bundle_w: 170, 
                bundle_h: 170, 
                db: 19,
                Avd_single: 287,
                diagonal_count: 4,
                hc: 160,
                Ash_single: 71.3,
                db_transverse: 10,
            });

            const handleChange = (e) => {
                const { name, value, type } = e.target;
                setInputs(prev => ({ ...prev, [name]: type === 'number' ? Number(value) : value }));
            };

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImageSrc(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            // --- Real-time Calculations ---
            const calcs = useMemo(() => {
                const ln_h = inputs.ln / inputs.h;
                const isSlender = ln_h >= 4;
                const Acp = inputs.b * inputs.h;
                const V_limit = (Math.sqrt(inputs.fck) / 3) * Acp * 1e-3;

                const x = inputs.bundle_h / 2;
                let alphaRad = Math.atan((inputs.h - 2 * x - 2 * inputs.c) / inputs.ln);
                for (let i = 0; i < 5; i++) {
                    alphaRad = Math.atan((inputs.h - (2 * x) / Math.cos(alphaRad) - 2 * inputs.c) / inputs.ln);
                }
                const alphaDeg = (alphaRad * 180 / Math.PI);
                const sinAlpha = Math.sin(alphaRad);

                const phi = 0.75;
                const Avd_req = (inputs.Vu * 1000) / (2 * phi * inputs.fyd * sinAlpha);
                const Avd_prov = inputs.diagonal_count * inputs.Avd_single;
                const phi_Vn_prov = phi * 2 * Avd_prov * inputs.fyd * sinAlpha * 1e-3;
                const Vn_prov = 2 * Avd_prov * inputs.fyd * sinAlpha * 1e-3;
                const Vn_max = (5 * Math.sqrt(inputs.fck) / 6) * Acp * 1e-3;

                const ld = ((0.6 * inputs.db * inputs.fyd) / (1 * Math.sqrt(inputs.fck)) * 1.3);
                const Ld_req = 1.25 * ld;
                const Ld_design = Math.ceil(Ld_req / 100) * 100;

                const Ag = (inputs.bundle_w + 2 * inputs.c) * (inputs.bundle_h + 2 * inputs.c);
                const Ach = inputs.bundle_w * inputs.bundle_h;
                const s_req1 = (2 * inputs.Ash_single) / (0.3 * inputs.hc * (inputs.fck / inputs.fyh) * (Ag / Ach - 1));
                const s_req2 = 100 + (350 - inputs.hc) / 3;
                const s_req3 = 150;
                const s_req4 = 6 * inputs.db;
                const s_req5 = inputs.b / 4;
                const s_final = Math.min(s_req1, s_req2, s_req3, s_req4, s_req5);
                const s_design = Math.floor(s_final / 5) * 5;

                const s1_req = (2 * inputs.Ash_single) / (0.002 * inputs.b);
                const s1_design = Math.floor(s1_req / 10) * 10;
                const Av_long_req = 0.002 * inputs.b * inputs.h;

                return {
                    ln_h, isSlender, V_limit, alphaDeg, sinAlpha, Avd_req, Avd_prov, phi_Vn_prov, Vn_prov, Vn_max,
                    Ld_req, Ld_design, s_req1, s_req2, s_req3, s_req4, s_req5, s_final, s_design, s1_req, s1_design, Av_long_req
                };
            }, [inputs]);

            const handleDownloadPDF = async () => {
                const { jsPDF } = window.jspdf;
                setIsGenerating(true);
                // Switch to report tab on mobile to ensure it's visible for capture
                const prevTab = activeTab;
                setActiveTab('report');
                await new Promise(r => setTimeout(r, 500));
                
                try {
                    const canvas = await html2canvas(reportRef.current, { 
                        scale: 2, 
                        useCORS: true,
                        windowWidth: 1200 // Force a desktop-like width for high-quality capture
                    });
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jsPDF('p', 'mm', 'a4');
                    const pdfWidth = pdf.internal.pageSize.getWidth();
                    const pdfHeight = pdf.internal.pageSize.getHeight();
                    const canvasRatio = canvas.height / canvas.width;
                    let finalWidth = pdfWidth;
                    let finalHeight = canvasRatio * pdfWidth;
                    if (finalHeight > pdfHeight) {
                        finalHeight = pdfHeight;
                        finalWidth = finalHeight / canvasRatio;
                    }
                    pdf.addImage(imgData, 'PNG', (pdfWidth - finalWidth) / 2, 0, finalWidth, finalHeight);
                    pdf.save(`${inputs.projectName}.pdf`);
                } finally {
                    setIsGenerating(false);
                    setActiveTab(prevTab);
                }
            };

            const EvalResult = ({ isOK }) => (
                <span className={isOK ? 'text-blue-600' : 'text-red-600'} style={{ fontWeight: 'bold', marginLeft: '6px' }}>
                    {isOK ? 'OK' : 'NG'}
                </span>
            );

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [activeTab]);

            return (
                <div className="flex flex-col md:flex-row h-screen overflow-hidden main-flex">
                    {/* Floating Mobile Sticky Header */}
                    <div className="md:hidden no-print bg-white border-b px-4 py-2 flex justify-between items-center z-50">
                        <div className="font-bold text-gray-800 text-sm">연결보 계산 프로그램</div>
                        <div className="flex gap-1">
                            <button 
                                onClick={() => setActiveTab('input')} 
                                className={`px-3 py-1 text-xs rounded-full border transition-all ${activeTab === 'input' ? 'bg-blue-600 text-white border-blue-600' : 'bg-gray-50 text-gray-600'}`}
                            >
                                <i data-lucide="edit-3" className="w-3 h-3 inline mr-1"></i>입력
                            </button>
                            <button 
                                onClick={() => setActiveTab('report')} 
                                className={`px-3 py-1 text-xs rounded-full border transition-all ${activeTab === 'report' ? 'bg-blue-600 text-white border-blue-600' : 'bg-gray-50 text-gray-600'}`}
                            >
                                <i data-lucide="file-text" className="w-3 h-3 inline mr-1"></i>계산서
                            </button>
                        </div>
                    </div>

                    {/* Left Sidebar (Desktop Side / Mobile Tab) */}
                    <div className={`sidebar w-80 bg-white border-r border-gray-200 no-print flex-col z-10 overflow-y-auto shrink-0 ${activeTab === 'input' ? 'flex' : 'hidden md:flex'}`}>
                        <div className="p-5 border-b bg-gray-50 sticky top-0 z-20">
                            <div className="flex items-center gap-2 font-bold text-gray-700 mb-4">
                                <i data-lucide="sliders-horizontal" className="w-5 h-5"></i>
                                설계 변수 입력
                            </div>
                            <button 
                                onClick={handleDownloadPDF} 
                                disabled={isGenerating} 
                                className="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-black text-white py-2.5 rounded-lg text-sm font-bold shadow-sm transition-all disabled:opacity-50"
                            >
                                <i data-lucide="download" className="w-4 h-4"></i>
                                {isGenerating ? '생성 중...' : 'PDF 리포트 저장'}
                            </button>
                        </div>

                        <div className="p-5 space-y-8 pb-20">
                            {/* Project Section */}
                            <section>
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 border-b pb-1">프로젝트 정보</h3>
                                <div className="space-y-3">
                                    <div className="flex flex-col"><span className="text-[11px] text-gray-500 font-medium ml-1">명칭</span><input value={inputs.projectName} name="projectName" onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500"/></div>
                                    <div className="flex flex-col"><span className="text-[11px] text-gray-500 font-medium ml-1">주제</span><input value={inputs.subject} name="subject" onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500"/></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="flex flex-col"><span className="text-[11px] text-gray-500 font-medium ml-1">엔지니어</span><input value={inputs.caculBy} name="caculBy" onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500"/></div>
                                        <div className="flex flex-col"><span className="text-[11px] text-gray-500 font-medium ml-1">날짜</span><input value={inputs.date} name="date" onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500"/></div>
                                    </div>
                                </div>
                            </section>

                            {/* Image Section */}
                            <section>
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 border-b pb-1">단면도 데이터</h3>
                                <div className="p-3 bg-slate-50 border-2 border-dashed border-slate-200 rounded-lg flex flex-col items-center justify-center text-center">
                                    <i data-lucide="image" className="w-8 h-8 text-slate-300 mb-2"></i>
                                    <label className="text-xs font-bold text-blue-600 cursor-pointer">이미지 선택 <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" /></label>
                                    <span className="text-[10px] text-slate-400 mt-1">PNG, JPG 추천</span>
                                </div>
                            </section>

                            {/* Dimensions Section */}
                            <section>
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 border-b pb-1">부재 기하학 (mm)</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">폭(b)</span><input type="number" name="b" value={inputs.b} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                    <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">높이(h)</span><input type="number" name="h" value={inputs.h} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                    <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">순경간(ln)</span><input type="number" name="ln" value={inputs.ln} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                    <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">피복(c)</span><input type="number" name="c" value={inputs.c} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                </div>
                            </section>

                            {/* Forces Section */}
                            <section>
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 border-b pb-1">단면력 설계</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">Vu (kN)</span><input type="number" name="Vu" value={inputs.Vu} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                    <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">Mu (kN·m)</span><input type="number" name="Mu" value={inputs.Mu} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                </div>
                            </section>

                            {/* Rebar Details Section */}
                            <section>
                                <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 border-b pb-1">철근 보강 상세</h3>
                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">다발 가로</span><input type="number" name="bundle_w" value={inputs.bundle_w} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                        <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">다발 세로</span><input type="number" name="bundle_h" value={inputs.bundle_h} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                        <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">주직경(db)</span><input type="number" name="db" value={inputs.db} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                        <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">주철근 개수</span><input type="number" name="diagonal_count" value={inputs.diagonal_count} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">횡철근 단면적</span><input type="number" name="Ash_single" value={inputs.Ash_single} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                        <div className="flex flex-col"><span className="text-xs font-medium text-slate-600">횡철근 직경</span><input type="number" name="db_transverse" value={inputs.db_transverse} onChange={handleChange} className="border border-slate-200 rounded p-2 text-sm"/></div>
                                    </div>
                                </div>
                            </section>
                        </div>
                    </div>

                    {/* Right Report Content (Desktop / Mobile Tab) */}
                    <div className={`content-area flex-1 p-10 overflow-y-auto no-print justify-center bg-gray-100 ${activeTab === 'report' ? 'flex' : 'hidden md:flex'}`}>
                        <div ref={reportRef} className="report-container print-area w-[210mm] min-h-[297mm] bg-white p-12 report-shadow rounded-sm text-[11px] leading-relaxed text-black box-border">
                            
                            {/* Header Panel */}
                            <div className="border-t-4 border-black pt-4 mb-6">
                                <div className="flex justify-between items-start mb-4">
                                    <h1 className="text-[18px] font-black uppercase tracking-tight leading-none">Coupling Beam<br/>Structural Analysis</h1>
                                    <div className="text-right text-[10px] font-mono text-slate-400">REPORT ID: AIS-{Math.random().toString(36).substr(2, 6).toUpperCase()}</div>
                                </div>
                                <table className="w-full border-collapse border border-black mb-6">
                                    <tbody>
                                        <tr>
                                            <td className="border border-black bg-slate-50 px-3 py-1.5 font-bold uppercase w-1/6">Project</td>
                                            <td className="border border-black px-3 font-semibold text-[13px]">{inputs.projectName}</td>
                                            <td className="border border-black bg-slate-50 px-3 py-1.5 font-bold uppercase w-1/6">Engineer</td>
                                            <td className="border border-black px-3 whitespace-nowrap">{inputs.caculBy}</td>
                                        </tr>
                                        <tr>
                                            <td className="border border-black bg-slate-50 px-3 py-1.5 font-bold uppercase">Subject</td>
                                            <td className="border border-black px-3 text-[13px]">{inputs.subject}</td>
                                            <td className="border border-black bg-slate-50 px-3 py-1.5 font-bold uppercase">Date</td>
                                            <td className="border border-black px-3">{inputs.date}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div className="mb-10">
                                <h2 className="text-[14px] font-black mb-3 flex items-center gap-2 uppercase tracking-wide">
                                    <span className="w-6 h-6 bg-black text-white flex items-center justify-center text-[11px]">01</span>
                                    설계 조건 (Design Conditions)
                                </h2>
                                <div className="flex gap-8 group">
                                    <div className="flex-1 space-y-2">
                                        <div className="flex justify-between border-b border-dotted border-slate-300 pb-1">
                                            <span className="font-semibold text-slate-600">부재 규격</span>
                                            <span>NBI {inputs.b} × {inputs.h} (mm)</span>
                                        </div>
                                        <div className="flex justify-between border-b border-dotted border-slate-300 pb-1">
                                            <span className="font-semibold text-slate-600">순경간 (ln)</span>
                                            <span>{inputs.ln} mm</span>
                                        </div>
                                        <div className="flex justify-between border-b border-dotted border-slate-300 pb-1">
                                            <span className="font-semibold text-slate-600">사용 재료</span>
                                            <span>f<sub>ck</sub>={inputs.fck} MPa, f<sub>y</sub>={inputs.fy} MPa</span>
                                        </div>
                                        <div className="flex justify-between border-b border-dotted border-slate-300 pb-1 text-blue-800 font-bold bg-blue-50 px-1">
                                            <span>설계 전단력 (Vu)</span>
                                            <span>{inputs.Vu} kN</span>
                                        </div>
                                        <div className="flex justify-between border-b border-dotted border-slate-300 pb-1">
                                            <span className="font-semibold text-slate-600">다발 철근</span>
                                            <span>{inputs.bundle_w} × {inputs.bundle_h} mm</span>
                                        </div>
                                    </div>
                                    <div className="w-56 h-36 border-2 border-slate-100 flex items-center justify-center grayscale overflow-hidden bg-slate-50 transition-all group-hover:grayscale-0">
                                        {imageSrc ? <img src={imageSrc} className="w-full h-full object-contain" /> : <div className="text-center text-slate-300 text-[9px] font-bold tracking-widest uppercase">SECTION VIEW<br/>NA</div>}
                                    </div>
                                </div>
                            </div>

                            <div className="mb-10">
                                <h2 className="text-[14px] font-black mb-6 border-b-2 border-black pb-1 flex items-center gap-2 uppercase tracking-wide">
                                    <span className="w-6 h-6 bg-black text-white flex items-center justify-center text-[11px]">02</span>
                                    기준 적합성 검토 및 상세 계산서
                                </h2>

                                <div className="space-y-8">
                                    <div className="relative pl-4 border-l-2 border-slate-100">
                                        <div className="absolute right-0 top-0 text-[10px] font-medium text-slate-400 bg-slate-50 px-2 py-0.5 rounded italic">KDS 14 20 80, 4.1.8.7</div>
                                        <h3 className="font-bold text-[12px] text-slate-800 mb-3 underline decoration-slate-200 underline-offset-4">2.1 대각선 보강 적용 여부 판정</h3>
                                        <div className="space-y-1.5 ml-1">
                                            <p><span className="text-slate-500">1) 세장비 검토:</span> l<sub>n</sub> / h = {inputs.ln} / {inputs.h} = <span className="font-bold">{calcs.ln_h.toFixed(2)}</span> {calcs.ln_h < 4 ? '<' : '≥'} 4</p>
                                            <p><span className="text-slate-500">2) 임계 전단력 검토:</span> √(f<sub>ck</sub>)/3 · A<sub>cp</sub> = √({inputs.fck})/3 · ({inputs.b}·{inputs.h}) = <span className="font-bold">{calcs.V_limit.toFixed(1)}</span> kN</p>
                                            <div className="mt-3 p-2 bg-slate-50 border border-slate-200 font-bold flex items-center gap-2 leading-none">
                                                <div className="w-1 h-3 bg-black"></div>
                                                판정결과: {calcs.ln_h < 4 ? '대각선 다발철근 보강 적용 대상' : '대각선 보강 불필요 (일반 전단벽 규정)'}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="relative pl-4 border-l-2 border-slate-100">
                                        <div className="absolute right-0 top-0 text-[10px] font-medium text-slate-400 bg-slate-50 px-2 py-0.5 rounded italic">KDS 14 20 80, 4.1.8.7</div>
                                        <h3 className="font-bold text-[12px] text-slate-800 mb-3 underline decoration-slate-200 underline-offset-4">2.2 개별 대각선 철근의 강도 및 상세 검토</h3>
                                        <div className="space-y-2 ml-1">
                                            <p><span className="text-slate-500">1) 경사각(α) 산정:</span> tan α = (h - 2x/cosα - 2c) / ln → <span className="font-bold">α ≈ {calcs.alphaDeg.toFixed(2)}°</span> (sin α = {calcs.sinAlpha.toFixed(3)})</p>
                                            <p><span className="text-slate-500">2) 요구 철근량:</span> A<sub>vd,req</sub> = V<sub>u</sub> / (2 Φ f<sub>y</sub> sin α) = <span className="font-bold">{calcs.Avd_req.toFixed(1)}</span> mm<sup>2</sup></p>
                                            <p><span className="text-slate-500">3) 설계 배근량:</span> <span className="font-bold underline">{inputs.diagonal_count}-D{inputs.db}</span> (A<sub>vd,prov</sub> = <span className="font-bold">{calcs.Avd_prov}</span> mm<sup>2</sup>) <EvalResult isOK={calcs.Avd_prov >= calcs.Avd_req} /></p>
                                            <p><span className="text-slate-500">4) 설계 전단강도:</span> ΦV<sub>n</sub> = Φ · (2 A<sub>vd</sub> f<sub>y</sub> sin α) = <span className="font-bold text-blue-700">{calcs.phi_Vn_prov.toFixed(1)}</span> kN ≥ {inputs.Vu} kN <EvalResult isOK={calcs.phi_Vn_prov >= inputs.Vu} /></p>
                                            <p><span className="text-slate-500">5) 최대 전단강도:</span> V<sub>n</sub> = <span className="font-bold">{calcs.Vn_prov.toFixed(1)}</span> kN ≤ V<sub>n,max</sub> ({calcs.Vn_max.toFixed(1)} kN) <EvalResult isOK={calcs.Vn_prov <= calcs.Vn_max} /></p>
                                        </div>
                                    </div>

                                    <div className="relative pl-4 border-l-2 border-slate-100">
                                        <div className="absolute right-0 top-0 text-[10px] font-medium text-slate-400 bg-slate-50 px-2 py-0.5 rounded italic">KDS 14 20 80, 4.1.8.7(4)</div>
                                        <h3 className="font-bold text-[12px] text-slate-800 mb-3 underline decoration-slate-200 underline-offset-4">2.3 대각선 다발철근의 정착 및 횡구속</h3>
                                        <div className="grid grid-cols-2 gap-6 ml-1">
                                            <div className="space-y-1">
                                                <p className="font-bold text-slate-400 text-[9px] uppercase tracking-tighter mb-1 border-b">A. 정착길이 (Development)</p>
                                                <p>요구 (L<sub>d,req</sub>): {calcs.Ld_req.toFixed(0)} mm</p>
                                                <p>설계 (L<sub>d,design</sub>): <span className="font-bold">{calcs.Ld_design}</span> mm <EvalResult isOK={calcs.Ld_design >= calcs.Ld_req} /></p>
                                            </div>
                                            <div className="space-y-1">
                                                <p className="font-bold text-slate-400 text-[9px] uppercase tracking-tighter mb-1 border-b">B. 횡구속 간격 (Confinement)</p>
                                                <p>A<sub>sh</sub>(2-Legs): {(2 * inputs.Ash_single).toFixed(1)} mm<sup>2</sup></p>
                                                <p>최종 간격: <span className="font-bold text-blue-700">D{inputs.db_transverse} @ {calcs.s_design}</span> mm <EvalResult isOK={calcs.s_design <= calcs.s_final} /></p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="relative pl-4 border-l-2 border-slate-100">
                                        <div className="absolute right-0 top-0 text-[10px] font-medium text-slate-400 bg-slate-50 px-2 py-0.5 rounded italic">KDS 14 20 80</div>
                                        <h3 className="font-bold text-[12px] text-slate-800 mb-3 underline decoration-slate-200 underline-offset-4">2.4 최소 철근비 및 보조 철근 검토</h3>
                                        <div className="space-y-2 ml-1">
                                            <p><span className="text-slate-500">1) 수직 스터럽 요구 간격:</span> s<sub>req</sub> = {calcs.s1_req.toFixed(0)} mm → <span className="font-bold underline">D{inputs.db_transverse} @ {calcs.s1_design} 배근</span> <EvalResult isOK={true} /></p>
                                            <p><span className="text-slate-500">2) 길이방향 철근량:</span> A<sub>v,req</sub> = {calcs.Av_long_req.toFixed(0)} mm<sup>2</sup> → <span className="font-bold underline">6-D{inputs.db} 배근</span> <EvalResult isOK={true} /></p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-12 p-6 border-l-8 border-black bg-slate-50 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="check-check" className="w-12 h-12"></i></div>
                                <h2 className="text-[15px] font-black mb-4 uppercase tracking-tight">3. 최종 배근 요약 (Conclusion)</h2>
                                <div className="grid grid-cols-2 gap-x-12 gap-y-3 font-bold text-[12px]">
                                    <div className="flex gap-2 items-start"><span className="text-blue-600">●</span> <span>대각선 주철근: {inputs.diagonal_count}-D{inputs.db} (정착길이 {calcs.Ld_design} mm)</span></div>
                                    <div className="flex gap-2 items-start"><span className="text-blue-600">●</span> <span>다발 횡구속 철근: D{inputs.db_transverse} @ {calcs.s_design} mm ({inputs.bundle_w}×{inputs.bundle_h} 구획)</span></div>
                                    <div className="flex gap-2 items-start"><span className="text-blue-600">●</span> <span>연결보 길이방향 철근: 6-D{inputs.db}</span></div>
                                    <div className="flex gap-2 items-start"><span className="text-blue-600">●</span> <span>수직 스터럽: D{inputs.db_transverse} @ {calcs.s1_design} mm</span></div>
                                </div>
                            </div>

                            <div className="mt-10 pt-4 border-t border-slate-100 flex justify-between items-end">
                                <div className="text-[10px] text-slate-400 italic">KDS 14 20 80 (2021) 구조설계기준 적합</div>
                                <div className="text-right">
                                    <div className="text-[10px] font-bold text-slate-600 mb-1">DESIGNED BY</div>
                                    <div className="w-32 h-8 border border-slate-200 bg-slate-50 flex items-center justify-center font-serif italic text-slate-400">Signature</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Polling to create icons due to react re-renders
        setInterval(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 1000);
    </script>
</body>
</html>
